name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install ".[dev]"

      - name: Run lint
        run: make lint

  test:
    name: Test
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install ".[dev]"

      - name: Run tests
        run: make test

  deploy:
    name: Deploy to Modal
    needs: test
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID != '' && secrets.MODAL_TOKEN_ID || secrets.MODAL_AUTH_KEY }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET != '' && secrets.MODAL_TOKEN_SECRET || secrets.MODAL_AUTH_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Verify Modal credentials
        run: |
          if [[ -n "${MODAL_TOKEN_ID}" && -n "${MODAL_TOKEN_SECRET}" ]]; then
            echo "Modal credentials found."
          else
            echo "::error::Modal credentials missing. Set MODAL_TOKEN_ID/MODAL_TOKEN_SECRET (or MODAL_AUTH_KEY/MODAL_AUTH_SECRET)."
            exit 1
          fi

      - name: Install deploy dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install ".[dev]"

      - name: Deploy app
        run: PYTHONPATH=src python3 -m modal deploy src/vecinita/app.py
