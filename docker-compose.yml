services:
  ollama:
    image: ollama/ollama:latest
    container_name: vecinita-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vecinita-api
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama:11434
      APP_NAME: vecinita-model-local
    ports:
      - "${API_PORT:-8000}:8000"

volumes:
  ollama-data:
